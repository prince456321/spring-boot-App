name: "music-web-app"

on:
  push:
    branches:
      - main

jobs:
  terraform:
    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false # Recommandé pour éviter les problèmes de formatage d'output

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Check AWS identity
        run: aws sts get-caller-identity

      - name: Terraform init
        working-directory: ./terraform-aws-music-app
        run: terraform init

      - name: Terraform destroy
        working-directory: ./terraform-aws-music-app
        # Utilisation d'une variable d'environnement pour injecter le mot de passe plus proprement
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform destroy -auto-approve
