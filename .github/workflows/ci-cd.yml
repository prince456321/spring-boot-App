name: "music-web-app"

on:
  push:
    branches:
      - main

jobs:
  # JOB 1 : Tests + Qualité + Coverage + Sécurité
  test-and-build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: jojo
          MYSQL_DATABASE: movie_app
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pjojo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make maven executable
        run: chmod +x mvnw

      # ✅ LINTER
      - name: Run Checkstyle
        run: ./mvnw checkstyle:check

      # ✅ TESTS + COVERAGE
      - name: Run Tests + Coverage
        run: ./mvnw clean verify

      # ✅ UPLOAD COVERAGE
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # ✅ BUILD IMAGE DOCKER
      - name: Build Docker Image
        run: docker build -t music-app:latest .

      # ✅ TRIVY SCAN (sécurité)
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'music-app:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # ✅ LOGIN GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      # ✅ PUSH IMAGE
      - name: Push Docker Image
        run: |
          docker tag music-app:latest ${{ vars.GHCR_IMAGE }}
          docker push ${{ vars.GHCR_IMAGE }}

  # JOB 2 : Terraform
  terraform:
    needs: test-and-build
    runs-on: ubuntu-latest

    outputs:
      ec2_public_ip: ${{ steps.set-outputs.outputs.EC2_PUBLIC_IP }}
      rds_endpoint: ${{ steps.set-outputs.outputs.RDS_ENDPOINT }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        working-directory: ./terraform-aws-music-app
        run: terraform init

      - name: Terraform Apply
        working-directory: ./terraform-aws-music-app
        env:
          TF_VAR_db_password: ${{ secrets.TF_VAR_DB_PASSWORD }}
        run: terraform apply -auto-approve

      - name: Set Outputs for next job
        id: set-outputs
        working-directory: ./terraform-aws-music-app
        run: |
          echo "EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT
          echo "RDS_ENDPOINT=$(terraform output -raw rds_endpoint)" >> $GITHUB_OUTPUT

  # JOB 3 : Déploiement EC2
  deploy:
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > music-app-key.pem
          chmod 600 music-app-key.pem

      - name: Copy deploy script to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i music-app-key.pem scripts/deploy.sh ec2-user@${{ needs.terraform.outputs.ec2_public_ip }}:/home/ec2-user/deploy.sh

      - name: Run deploy script on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i music-app-key.pem ec2-user@${{ needs.terraform.outputs.ec2_public_ip }} "
            chmod +x /home/ec2-user/deploy.sh && \
            GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' \
            GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' \
            GHCR_IMAGE='${{ vars.GHCR_IMAGE }}' \
            RDS_ENDPOINT='${{ needs.terraform.outputs.rds_endpoint }}' \
            DB_USERNAME='adminuser' \
            DB_PASSWORD='${{ secrets.TF_VAR_DB_PASSWORD }}' \
            APP_PORT='${{ vars.APP_PORT }}' \
            /home/ec2-user/deploy.sh
          "

      - name: Check deployed application
        run: |
          sleep 20
          curl -f http://${{ needs.terraform.outputs.ec2_public_ip }}:${{ vars.APP_PORT }}/swagger-ui.html
