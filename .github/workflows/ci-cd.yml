name: music-web-app

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4  # <-- Correction ici : "actions" avec un "s"
      - name: Verifier la presence des fichiers
        run: ls -R  # Cette commande affiche la liste de tous tes fichiers
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
        

