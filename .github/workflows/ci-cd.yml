name: music-web-app

on:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: jojo
          MYSQL_DATABASE: movie_app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -pjojo"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: checkout code
        uses: actions/checkout@v4  # <-- Correction ici : "actions" avec un "s"
      - name: Verifier la presence des fichiers
        run: ls -R  # Cette commande affiche la liste de tous tes fichiers
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: make maven executable
        run: chmod +x mvnw
      - name: Run unit test
        run: ./mvnw test
      - name: check MySQL connection
        run: mysqladmin ping -h mysql -P 3306 -uroot -pjojo
    
    
        

